<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - MNLuxury</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
        }

        nav {
            background: black;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #d4af37;
        }

        .contact-container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .contact-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            background: black;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d4af37;
            color: black;
        }

        footer {
            background: black;
            color: white;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .footer-section {
            width: 250px;
            margin-bottom: 20px;
        }

        .footer-section h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .footer-links a {
            display: block;
            color: #ccc;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .footer-links a:hover {
            color: white;
        }

        .subscribe-box input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        .subscribe-box button {
            width: 100%;
            padding: 10px;
            background: #d4af37;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .subscribe-box button:hover {
            background: white;
        }

        .footer-bottom {
            text-align: center;
            width: 100%;
            margin-top: 20px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">
            <img src="logo.png" alt="MNLuxury Logo" style="height:50px; width:auto;">
            LuXury
        </div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </nav>

    <div class="contact-container">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="tel" placeholder="Phone Number" required>
            <textarea placeholder="Write your issue here..." required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>

    <footer>
        <div class="footer-section">
            <h3>Menu</h3>
            <div class="footer-links">
                <a href="home.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </div>
        </div>
        <div class="footer-section">
            <h3>Subscribe</h3>
            <div class="subscribe-box">
                <input type="text" placeholder="Enter your email">
                <button>Subscribe</button>
            </div>
        </div>
        <div class="footer-section">
            <h3>Policies</h3>
            <div class="footer-links">
                <a href="#">Terms & Conditions</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Return Policy</a>
            </div>
        </div>
        <div class="footer-bottom">
            © 2026 MNLuxury — All Rights Reserved
        </div>
    </footer>

</body>

</html>
